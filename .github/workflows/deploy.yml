name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, subprocess, tempfile, time

          script = "\n".join([
            "set net:timeout 20",
            "set net:max-retries 3",
            "set net:reconnect-interval-base 3",
            "set net:reconnect-interval-multiplier 1",
            "set net:reconnect-interval-max 8",
            "set ssl:verify-certificate no",
            "set ftp:ssl-allow yes",
            f"open ftp://{os.environ['FTP_HOST']}",
            f"user {os.environ['FTP_USER']} {os.environ['FTP_PASS']}",
            "mirror --reverse --delete --verbose dist/ /public_html/",
            "quit",
          ])

          for attempt in range(1, 4):
            with tempfile.NamedTemporaryFile(mode='w', suffix='.lftp', delete=False) as f:
              f.write(script)
              tmp = f.name
            result = subprocess.run(["lftp", "-f", tmp], capture_output=False)
            os.unlink(tmp)
            if result.returncode == 0:
              break
            print(f"Attempt {attempt} failed, retrying in 15s...")
            time.sleep(15)

          exit(result.returncode)
          EOF
