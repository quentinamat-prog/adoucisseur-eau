name: Generate Weekly Article

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:

concurrency:
  group: hostinger-ftp
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-article.mjs

      - name: Compress new images
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          const dir = './public/images/blog';
          if (!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.webp'));
          Promise.all(files.map(async f => {
            const fp = path.join(dir, f);
            const buf = await sharp(fp).webp({ quality: 65 }).toBuffer();
            if (buf.length < fs.statSync(fp).size) fs.writeFileSync(fp, buf);
          })).then(() => console.log('Images compressed'));
          "

      - name: Check if article was created
        id: check
        run: |
          git add src/content/blog/ scripts/topics.json public/images/blog/
          git diff --staged --quiet && echo "created=false" >> $GITHUB_OUTPUT || echo "created=true" >> $GITHUB_OUTPUT

      - name: Commit new article
        if: steps.check.outputs.created == 'true'
        run: |
          SITE_NAME=$(node -e "import('./site.config.mjs').then(m=>process.stdout.write(m.default.name))")
          git config user.name "${SITE_NAME} Bot"
          git config user.email "bot@${GITHUB_REPOSITORY#*/}.com"
          git commit -m "chore: auto-generate article"
          git push

      - name: Build
        if: steps.check.outputs.created == 'true'
        run: npm run build

      - name: Install lftp
        if: steps.check.outputs.created == 'true'
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        if: steps.check.outputs.created == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, subprocess, tempfile, time

          script = "\n".join([
            "set net:timeout 30",
            "set net:max-retries 10",
            "set net:reconnect-interval-base 5",
            "set net:reconnect-interval-multiplier 1",
            "set net:reconnect-interval-max 15",
            "set ssl:verify-certificate no",
            "set ftp:ssl-allow yes",
            f"open ftp://{os.environ['FTP_HOST']}",
            f"user {os.environ['FTP_USER']} {os.environ['FTP_PASS']}",
            "mirror --reverse --delete --verbose dist/ /public_html/",
            "quit",
          ])

          for attempt in range(1, 4):
            with tempfile.NamedTemporaryFile(mode='w', suffix='.lftp', delete=False) as f:
              f.write(script)
              tmp = f.name
            result = subprocess.run(["lftp", "-f", tmp], capture_output=False)
            os.unlink(tmp)
            if result.returncode == 0:
              break
            print(f"Attempt {attempt} failed, retrying in 15s...")
            time.sleep(15)

          exit(result.returncode)
          EOF
