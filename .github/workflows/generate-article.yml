name: Generate Weekly Article

on:
  schedule:
    - cron: '0 8 * * 1'  # Chaque lundi à 8h UTC
  workflow_dispatch:

concurrency:
  group: o2switch-ftp
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-article.mjs

      - name: Check if article was created
        id: check
        run: |
          git add src/content/blog/ scripts/topics.json public/images/blog/
          git diff --staged --quiet && echo "created=false" >> $GITHUB_OUTPUT || echo "created=true" >> $GITHUB_OUTPUT

      - name: Commit new article
        if: steps.check.outputs.created == 'true'
        run: |
          git config user.name "Adoucisseur-eau Bot"
          git config user.email "bot@adoucisseur-eau.fr"
          git commit -m "chore: auto-generate article SEO"
          git push

      - name: Build
        if: steps.check.outputs.created == 'true'
        run: npm run build

      - name: Deploy via FTP (incremental)
        if: steps.check.outputs.created == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
